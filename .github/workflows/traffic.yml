name: Traffic Analytics – LLMfitDownloadhelper
on:
  schedule:
    - cron: '0 0 * * *' # Läuft jede Nacht um 00:00 UTC
  workflow_dispatch: # Ermöglicht manuelles Starten über die GitHub-Oberfläche

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch All Traffic Data via API
        env:
          REPO: ${{ github.repository }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<EOF
          import os, requests, json, datetime

          repo = os.environ['REPO']
          token = os.environ['TOKEN']
          headers = {
              'Authorization': f'token {token}',
              'Accept': 'application/vnd.github.v3+json'
          }
          base_url = f'https://api.github.com/repos/{repo}'

          os.makedirs('docs', exist_ok=True)
          today = datetime.datetime.utcnow().strftime('%Y-%m-%d')

          def load_history(filename):
              if os.path.exists(filename):
                  with open(filename, 'r') as f:
                      return json.load(f)
              return []

          def merge_time_series(history, current_data):
              # Kombiniert alte Daten mit neuen und filtert Duplikate nach Datum
              lookup = {d['timestamp'][:10]: d for d in history}
              for d in current_data:
                  lookup[d['timestamp'][:10]] = d
              return sorted(list(lookup.values()), key=lambda x: x['timestamp'])

          # 1. Views abrufen (Seitenaufrufe)
          r = requests.get(f'{base_url}/traffic/views', headers=headers).json()
          if 'views' in r:
              hist = load_history('docs/views.json')
              with open('docs/views.json', 'w') as f:
                  json.dump(merge_time_series(hist, r['views']), f, indent=2)

          # 2. Clones abrufen (Git-Klone)
          r = requests.get(f'{base_url}/traffic/clones', headers=headers).json()
          if 'clones' in r:
              hist = load_history('docs/clones.json')
              with open('docs/clones.json', 'w') as f:
                  json.dump(merge_time_series(hist, r['clones']), f, indent=2)

          # 3. Referrers abrufen (Top-Verweisquellen)
          r = requests.get(f'{base_url}/traffic/popular/referrers', headers=headers).json()
          if isinstance(r, list):
              with open('docs/referrers.json', 'w') as f:
                  json.dump(r, f, indent=2)

          # 4. Paths abrufen (Beliebte Unterseiten)
          r = requests.get(f'{base_url}/traffic/popular/paths', headers=headers).json()
          if isinstance(r, list):
              with open('docs/paths.json', 'w') as f:
                  json.dump(r, f, indent=2)

          print(f"✅ Traffic-Daten erfolgreich aktualisiert am {today}")
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff-index --quiet HEAD ||           git commit -m "chore: archive traffic analytics for LLMfitDownloadhelper"
          git push
